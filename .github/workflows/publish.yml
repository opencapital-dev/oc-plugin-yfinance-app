name: release

# On merge to main: the reusable pipeline runs semantic-release (Conventional
# Commits -> next version), builds the Go backend on native runners, pushes +
# signs the plugin to GHCR, then tags + bumps oc-plugin.json versions[] and cuts
# a GitHub Release. No manual tagging.
on:
  push:
    branches: [main]

jobs:
  release:
    # permissions on the calling job (reusable-workflow calls honor job-level,
    # not top-level, for propagating GITHUB_TOKEN scope to the called workflow)
    permissions:
      contents: write
      packages: write
      id-token: write
    uses: opencapital-dev/opencapital/.github/workflows/plugin-release.yml@main
    with:
      id: basic-data-app
      owner: opencapital-dev
      platforms: darwin-amd64,darwin-arm64,windows-amd64
    secrets: inherit
